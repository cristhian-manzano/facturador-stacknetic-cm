name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  check-xsd-sync:
    name: XSD byte-equal guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify docs/ and apps/sri-core/resources/ XSDs are byte-equal
        run: pnpm --filter @facturador/sri-core check:xsd-sync

  lint-docker:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Hadolint is distributed as a single binary; the official action wraps
      # the latest release and can lint multiple Dockerfiles in one pass.
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/api/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/sri-core/Dockerfile
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/web/Dockerfile

  test:
    name: Test (Vitest + coverage)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: facturador
          POSTGRES_PASSWORD: facturador
          POSTGRES_DB: facturador
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U facturador -d facturador"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      # Host-side connection — tests run on the runner and reach the
      # postgres service via the published port mapping.
      DATABASE_URL: postgresql://facturador:facturador@localhost:5432/facturador?schema=public
      NODE_ENV: test
      LOG_LEVEL: warn
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @facturador/db prisma:generate
      - name: Apply migrations
        run: pnpm --filter @facturador/db prisma:migrate:deploy
      - name: Seed dev tenant (idempotent)
        run: pnpm --filter @facturador/db seed
      - name: Build workspace packages
        run: pnpm -r build
      - name: Run tests with coverage
        run: pnpm -r --workspace-concurrency=1 test:coverage
